<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - JitterClone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/index.css">
    <link rel="stylesheet" href="./src/styles/dashboard.css">
    <link rel="stylesheet" href="./src/styles/components.css">
  </head>
  <body class="dashboard-page">
    <aside class="dash-sidebar">
      <div class="logo" style="margin-bottom:32px;padding:0 16px;">✨ JitterClone</div>
      <nav class="dash-nav">
        <a href="#" class="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Recent files
        </a>
        <a href="#">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
          Templates
        </a>
      </nav>
      <div class="user-profile">
        <div class="avatar">U</div>
        <div class="user-info">
          <div class="name">Creator User</div>
          <div class="plan">Free Plan</div>
        </div>
      </div>
    </aside>

    <main class="dash-main">
      <header class="dash-header">
        <h2>Recent files</h2>
        <a href="./editor.html" class="btn btn-primary">+ New file</a>
      </header>

      <div class="projects-grid">
        <a href="./editor.html" class="project-card new-project">
          <div class="project-thumb empty">+</div>
          <div class="project-info">
            <h4>Blank canvas</h4>
            <p>16:9 · 1920x1080</p>
          </div>
        </a>

        <a href="./editor.html?template=social" class="project-card">
          <div class="project-thumb demo-1">
            <span class="badge">Template</span>
          </div>
          <div class="project-info">
            <h4>Social Media Promo</h4>
            <p>Modified 2 hours ago</p>
          </div>
        </a>

        <a href="./editor.html" class="project-card">
          <div class="project-thumb demo-2"></div>
          <div class="project-info">
            <h4>App Showcase</h4>
            <p>Modified yesterday</p>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
